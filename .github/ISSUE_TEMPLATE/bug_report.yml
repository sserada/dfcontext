name: Bug Report
description: Report a bug in dfcontext
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the information below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code example to reproduce the issue.
      placeholder: |
        ```python
        import pandas as pd
        from dfcontext import to_context

        df = pd.DataFrame({"col": [1, 2, 3]})
        ctx = to_context(df, token_budget=500)
        # Expected: ...
        # Actual: ...
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or tracebacks if applicable.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: dfcontext Version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: python-version
    attributes:
      label: Python Version
      options:
        - "3.10"
        - "3.11"
        - "3.12"
        - "3.13"
    validations:
      required: true

  - type: input
    id: pandas-version
    attributes:
      label: pandas Version
      placeholder: "2.2.0"

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context (OS, optional dependencies installed, etc.).
